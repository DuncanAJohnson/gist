<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <circle cx="32" cy="32" r="28" fill="#BFDBFE" stroke="#1E3A8A" stroke-width="2"/>
  <circle cx="32" cy="32" r="24" fill="none" stroke="#3B82F6" stroke-width="1"/>
  
  <!-- 12 o'clock -->
  <rect x="31" y="6" width="2" height="6" fill="#1E3A8A"/>
  <!-- 3 o'clock -->
  <rect x="52" y="31" width="6" height="2" fill="#1E3A8A"/>
  <!-- 6 o'clock -->
  <rect x="31" y="52" width="2" height="6" fill="#1E3A8A"/>
  <!-- 9 o'clock -->
  <rect x="6" y="31" width="6" height="2" fill="#1E3A8A"/>
  
  <!-- Hour markers -->
  <circle cx="32" cy="12" r="1.5" fill="#3B82F6"/>
  <circle cx="44.8" cy="19.2" r="1.5" fill="#3B82F6"/>
  <circle cx="44.8" cy="44.8" r="1.5" fill="#3B82F6"/>
  <circle cx="19.2" cy="44.8" r="1.5" fill="#3B82F6"/>
  <circle cx="19.2" cy="19.2" r="1.5" fill="#3B82F6"/>
  <circle cx="52" cy="32" r="1.5" fill="#3B82F6"/>
  <circle cx="12" cy="32" r="1.5" fill="#3B82F6"/>
  <circle cx="32" cy="52" r="1.5" fill="#3B82F6"/>
  
  <!-- Hour hand pointing to 3 -->
  <line x1="32" y1="32" x2="42" y2="32" stroke="#1E3A8A" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Minute hand pointing to 12 -->
  <line x1="32" y1="32" x2="32" y2="16" stroke="#3B82F6" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Center dot -->
  <circle cx="32" cy="32" r="2" fill="#1E3A8A"/>
</svg>