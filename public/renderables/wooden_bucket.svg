<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Handle -->
  <path d="M20 18 Q32 8 44 18" stroke="#3D1F0A" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Bucket body -->
  <path d="M16 22 L20 52 Q32 56 44 52 L48 22 Z" fill="#8B4513"/>
  <!-- Wood planks shading -->
  <rect x="18" y="28" width="28" height="4" rx="1" fill="#5C2D0A" opacity="0.5"/>
  <rect x="18" y="36" width="28" height="4" rx="1" fill="#5C2D0A" opacity="0.5"/>
  <rect x="19" y="44" width="26" height="4" rx="1" fill="#5C2D0A" opacity="0.5"/>
  <!-- Top rim -->
  <ellipse cx="32" cy="22" rx="16" ry="4" fill="#3D1F0A"/>
  <!-- Bottom -->
  <ellipse cx="32" cy="51" rx="12" ry="3" fill="#3D1F0A"/>
  <!-- Highlight -->
  <path d="M20 26 L21 50" stroke="#C68642" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <!-- Metal band top -->
  <rect x="16" y="26" width="32" height="3" rx="1" fill="#3D1F0A" opacity="0.6"/>
  <!-- Metal band middle -->
  <rect x="17" y="38" width="30" height="3" rx="1" fill="#3D1F0A" opacity="0.6"/>
  <!-- Handle attachment left -->
  <circle cx="20" cy="22" r="2.5" fill="#3D1F0A"/>
  <!-- Handle attachment right -->
  <circle cx="44" cy="22" r="2.5" fill="#3D1F0A"/>
  <!-- Light reflection -->
  <ellipse cx="32" cy="22" rx="10" ry="2" fill="#C68642" opacity="0.3"/>
</svg>