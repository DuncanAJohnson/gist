<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Pizza slice - triangle shape -->
  <!-- Crust (dark golden) -->
  <polygon points="32,4 6,58 58,58" fill="#d97706"/>
  <!-- Cheese layer (light yellow) -->
  <polygon points="32,10 9,54 55,54" fill="#fde68a"/>
  <!-- Crust edge detail -->
  <polygon points="32,4 6,58 58,58" fill="none" stroke="#b45309" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Crust bump texture -->
  <ellipse cx="32" cy="56" rx="4" ry="2.5" fill="#b45309"/>
  <ellipse cx="20" cy="56" rx="3" ry="2" fill="#b45309"/>
  <ellipse cx="44" cy="56" rx="3" ry="2" fill="#b45309"/>
  <!-- Pepperoni circles -->
  <circle cx="32" cy="28" r="6" fill="#b91c1c"/>
  <circle cx="32" cy="28" r="6" fill="none" stroke="#7f1d1d" stroke-width="1"/>
  <circle cx="20" cy="42" r="5" fill="#b91c1c"/>
  <circle cx="20" cy="42" r="5" fill="none" stroke="#7f1d1d" stroke-width="1"/>
  <circle cx="44" cy="42" r="5" fill="#b91c1c"/>
  <circle cx="44" cy="42" r="5" fill="none" stroke="#7f1d1d" stroke-width="1"/>
  <!-- Pepperoni highlight dots -->
  <circle cx="30" cy="26" r="1.2" fill="#ef4444" opacity="0.7"/>
  <circle cx="18" cy="40" r="1.2" fill="#ef4444" opacity="0.7"/>
  <circle cx="42" cy="40" r="1.2" fill="#ef4444" opacity="0.7"/>
  <!-- Cheese sauce lines suggestion -->
  <line x1="26" y1="18" x2="22" y2="38" stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="38" y1="20" x2="42" y2="38" stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
</svg>